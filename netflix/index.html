<!-- Doctype defines the syntax read when running this file -->
<!-- That is, the html version being used -->
<!DOCTYPE html>
<!-- defining language as pt-br -->
<html lang="pt-br">
<!-- Head defines the site metadata -->
<head>
    <!-- choosing the characters used -->
    <meta charset="UTF-8">
    <!-- define viewport and site structure -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Maykon Jr</title>
</head>
<body>
    <!-- required tag for the website's main content -->
    <main>
        <h1>Maykon Jr PirataFlix</h1>
        <!-- AI usually sugest using a lot of <div></div> tags, but that makes the site content less accessible (the site becomes less responsible to accessibility extensions) and less indexable for search mecanisms, that can't navegate through div tags well -->
         <!-- A main division to join the profiles -->
        <div class = "profiles">
            <div class = "profile 1">
                <!-- a image for the profile -->
                <!-- The image path or link must be a string -->
                <!-- The alt text will be inserted if the image source isn't available -->
                <img src="/assets/profile-1.jpg" alt="Imagem 1 inválida">
                <p>Maykon Jr</p>
            </div>
            <div class = "profile 2">
                <img src="/assets/profile-2.jpg" alt="Imagem 2 Inválida">
                <p>Perfil 2</p>
            </div>
        </div>
    </main>
</body>
</html>
