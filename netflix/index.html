<!-- Doctype defines the syntax read when running this file -->
<!-- That is, the html version being used -->
<!DOCTYPE html>
<!-- defining language as pt-br -->
<html lang="pt-br">
<!-- Head defines the site metadata -->
<head>
    <!-- choosing the characters used -->
    <meta charset="UTF-8">
    <!-- define viewport and site structure -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Maykon Jr</title>
    <!-- Linking the styling file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- required tag for the website's main content -->
    <main>
        <!-- IDs are possible as a class alternative, but they can't be shared bewtween elements-->
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema"></button>
        <!-- Scripts to add actions to the page -->
        <script src="theme.js"></script>
        <h1 id="Main">Bichos Pinga</h1>
         <!-- A main division to join the profiles -->
        <section aria-label = "Perfis">
            <!-- Classes are important so that css files can alter all tags with this class at once -->
            <nav class = "profiles">
                <!-- Unordered List -->
                <ul>
                    <!-- Ordered List -->
                    <ol>
                        <!-- List Item -->
                        <li>
                            <a href="#" class="profile">
                                 <!-- it's better to separate what is related to the figures on a tag -->
                                 <figure>
                                         <!-- a image for the profile -->
                                         <!-- The image path or link must be a string -->
                                         <!-- The alt text will be inserted if the image source isn't available; and it is also read the sreen readers -->
                                         <img
                                         src="/assets/all.png" alt="Imagem da Praia">
                                         <!-- using <figcaption> instead of a paragraph <p> to make the text closer to the image and better organized-->
                                         <figcaption>Todos</figcaption>
                                 </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="profile">
                                 <!-- it's better to separate what is related to the figures on a tag -->
                                 <figure>
                                         <!-- a image for the profile -->
                                         <!-- The image path or link must be a string -->
                                         <!-- The alt text will be inserted if the image source isn't available; and it is also read the sreen readers -->
                                         <img
                                         src="/assets/profile-1.jpg" alt="Imagem do Pai">
                                         <!-- using <figcaption> instead of a paragraph <p> to make the text closer to the image and better organized-->
                                         <figcaption>Pai</figcaption>
                                 </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#" class = "profile">
                                <figure>
                                    <img src="/assets/profile-2.jpg" alt="Imagem do Maykon Jr">
                                    <figcaption>Maykon Jr</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#" class = "profile">
                                <figure>
                                    <img src="/assets/profile-3.jpg" alt="Imagem do Matheus">
                                    <figcaption>Matheus</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#" class = "profile">
                                <figure>
                                    <img src="/assets/profile-4.jpg" alt="Imagem do Pedro">
                                    <figcaption>Pedro</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#" class = "profile">
                                <figure>
                                    <img src="/assets/profile-5.jpg" alt="Imagem do João">
                                    <figcaption>João</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </ul>
            </nav>
        </section>
    </main>
</body>
</html>
